<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hyperbolic Canvas</title>
<style>
:root {
  --bg: #f9f8f4;
  --surface: #efeee9;
  --surface-elevated: #ffffff;
  --text: #2c2c2a;
  --text-muted: #5f5e5a;
  --grid: #807f78;
  --border: rgba(0,0,0,0.12);
  --accent: #534AB7;
  --c1: #534AB7;
  --c2: #0F6E56;
  --c3: #854F0B;
  --c4: #5F5E5A;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #161513;
    --surface: #1e1d1a;
    --surface-elevated: #262522;
    --text: #c2c0b6;
    --text-muted: #9c9a92;
    --grid: #6e6d65;
    --border: rgba(255,255,255,0.12);
    --accent: #AFA9EC;
    --c1: #AFA9EC;
    --c2: #5DCAA5;
    --c3: #EF9F27;
    --c4: #B4B2A9;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: stretch;
  padding: 16px;
  gap: 12px;
}
#stage {
  position: relative;
  flex: 1;
  background: var(--surface);
  border-radius: 10px;
  overflow: hidden;
  touch-action: none;
  border: 0.5px solid var(--border);
}
#stage canvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  display: block;
}
#stage.mode-pan { cursor: grab; }
#stage.mode-edit { cursor: grab; }
#stage.mode-move { cursor: grab; }
#stage.dragging { cursor: grabbing !important; }
#stage.item-drag { cursor: move !important; }
#stage.mode-pan .item:not(.editing) { cursor: pointer; }
#stage.mode-edit .item:not(.editing) { cursor: text; }
#stage.mode-move .item:not(.editing) { cursor: move; }
.item {
  position: absolute; left: 0; top: 0;
  white-space: nowrap;
  font-size: 16px;
  font-weight: 500;
  transform-origin: center center;
  will-change: transform, opacity;
  user-select: none;
}
.item.c1 { color: var(--c1); }
.item.c2 { color: var(--c2); }
.item.c3 { color: var(--c3); }
.item.c4 { color: var(--c4); }
#stage:not(.dragging):not(.item-drag) .item:not(.as-dot):not(.as-pill-h):not(.as-pill-v):hover {
  text-decoration: underline;
}
.item.as-dot {
  font-size: 0; line-height: 0;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  padding: 0 !important;
  outline: none !important;
}
.item.as-pill-h, .item.as-pill-v {
  font-size: 0; line-height: 0;
  background: currentColor;
  border-radius: 99px;
  padding: 0 !important;
  outline: none !important;
}
.item.as-pill-h { width: 16px; height: 3px; }
.item.as-pill-v { width: 3px; height: 16px; }
.item.editing {
  cursor: text;
  user-select: text;
  outline: 1.5px solid var(--accent);
  outline-offset: 4px;
  background: var(--surface-elevated);
  padding: 8px 16px;
  border-radius: 8px;
  z-index: 10;
  text-decoration: none !important;
  font-size: 16px !important;
  line-height: normal !important;
  width: auto !important;
  height: auto !important;
}
.mode-buttons {
  position: absolute;
  top: 16px; left: 16px;
  display: flex; gap: 4px;
  z-index: 5;
  background: var(--surface-elevated);
  padding: 4px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
}
.mode-buttons button {
  padding: 5px 12px;
  background: transparent;
  border: none;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-muted);
  font: inherit; line-height: 1.4;
}
.mode-buttons button:hover { color: var(--text); }
.mode-buttons button.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.zoom-control {
  position: absolute;
  bottom: 16px; right: 16px;
  display: flex; align-items: center; gap: 10px;
  background: var(--surface-elevated);
  padding: 6px 14px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
  z-index: 5;
}
.zoom-control input[type="range"] { width: 120px; accent-color: var(--accent); }
.zoom-control #zoom-val { min-width: 32px; text-align: right; font-variant-numeric: tabular-nums; }
.controls {
  display: flex; gap: 16px; align-items: center;
  font-size: 13px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.controls .hint { flex: 1; }
.controls button {
  padding: 6px 14px;
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  font: inherit;
}
.controls button:hover { background: var(--surface); }
.controls button:active { transform: scale(0.98); }
</style>
</head>
<body>
<div id="stage" class="mode-pan">
  <canvas id="grid"></canvas>
  <div class="mode-buttons">
    <button data-mode="pan" class="active">导航</button>
    <button data-mode="edit">编辑</button>
    <button data-mode="move">移动</button>
  </div>
  <div class="zoom-control">
    <span>缩放</span>
    <input type="range" id="zoom" min="0.6" max="2.5" step="0.05" value="1">
    <span id="zoom-val">1.0×</span>
  </div>
</div>
<div class="controls">
  <span class="hint" id="hint">导航模式：拖拽平移 · 点空白处飞过去</span>
  <span>离原点 <span id="dist">0.00</span></span>
  <button id="reset">回到原点</button>
</div>
<script>
(function() {
  const cadd = (a,b)=>[a[0]+b[0], a[1]+b[1]];
  const cmul = (a,b)=>[a[0]*b[0]-a[1]*b[1], a[0]*b[1]+a[1]*b[0]];
  const cdiv = (a,b)=>{ const d=b[0]*b[0]+b[1]*b[1]; return [(a[0]*b[0]+a[1]*b[1])/d,(a[1]*b[0]-a[0]*b[1])/d]; };
  const cconj = a=>[a[0],-a[1]];
  const cabs2 = a=>a[0]*a[0]+a[1]*a[1];
  const cabs = a=>Math.sqrt(cabs2(a));
  const cscale = (a,s)=>[a[0]*s, a[1]*s];
  const cneg = a=>[-a[0],-a[1]];

  const mApply = (M, z) => {
    const num = cadd(cmul(M.a, z), M.b);
    const den = cadd(cmul(cconj(M.b), z), cconj(M.a));
    return cdiv(num, den);
  };
  const mComp = (M1, M2) => ({
    a: cadd(cmul(M1.a, M2.a), cmul(M1.b, cconj(M2.b))),
    b: cadd(cmul(M1.a, M2.b), cmul(M1.b, cconj(M2.a)))
  });
  const mInv = M => ({ a: cconj(M.a), b: cneg(M.b) });
  const mFromPQ = (p, q) => {
    const np = 1 / Math.sqrt(Math.max(1e-12, 1 - cabs2(p)));
    const Tp = { a: [np, 0], b: cscale(cneg(p), np) };
    const nq = 1 / Math.sqrt(Math.max(1e-12, 1 - cabs2(q)));
    const Tq = { a: [nq, 0], b: cscale(q, nq) };
    return mComp(Tq, Tp);
  };
  const identity = { a: [1, 0], b: [0, 0] };

  const words = [
    'Fireball','Magic Missile','Counterspell','Wish','Healing Word',
    'Eldritch Blast','Polymorph','Time Stop','Meteor Swarm','Shield',
    'Vicious Mockery','Cure Wounds','Banishment','Misty Step','Mage Hand',
    "Hunter's Mark",'Hex','Bless','Dispel Magic','Hold Person','Sleep',
    'Mass Suggestion','Power Word Kill','True Polymorph','Disintegrate',
    'Paladin','Wizard','Sorcerer','Rogue','Bard','Druid','Fighter',
    'Cleric','Warlock','Ranger','Monk','Barbarian','Artificer',
    'Tiefling','Dragonborn','Elf','Halfling','Dwarf','Gnome',
    'Half-orc','Aasimar','Tabaxi','Goliath','Firbolg','Genasi',
    'Beholder','Mind Flayer','Mimic','Lich','Tarrasque','Owlbear',
    'Dire Wolf','Goblin','Bugbear','Troll','Displacer Beast',
    'Rust Monster','Gelatinous Cube','Ancient Red Dragon','Vampire',
    'Banshee','Wraith','Pit Fiend','Kobold','Drow','Githyanki',
    'Bag of Holding','Vorpal Sword','Ring of Protection',
    'Wand of Wonder','Deck of Many Things','+1 Longsword',
    'Cloak of Elvenkind','Mithral Plate','Healing Potion',
    'Scroll of Fireball','Staff of Power','Sending Stone',
    'Holy Avenger','Boots of Speed','Portable Hole',
    'Hat of Disguise','Robe of the Archmagi',
    'Waterdeep','Neverwinter',"Baldur's Gate",'Underdark',
    'Feywild','Shadowfell','Avernus','Candlekeep',
    'Icewind Dale','Barovia','Sigil','Menzoberranzan',
    'Ravenloft','the Nine Hells','the Astral Sea',
    'Initiative','Saving Throw','Nat 20!','Nat 1','Death Save',
    'Inspiration','Sneak Attack','Bonus Action','Reaction',
    'Concentration','Long Rest','Short Rest',
    'Action Surge','Rage','Wild Shape','Lay on Hands',
    'Bardic Inspiration','Channel Divinity','Smite',
    'STR 18','DEX 14','CON 16','WIS 12','CHA 8',
    'AC 18','HP 47','DC 15','+7 to hit','5d6 fire',
    'TPK','Crit!','Disadvantage','Advantage',
    'Stealth check','Persuasion','Investigation','Arcana','Perception',
    'Athletics','Acrobatics','Sleight of Hand','Insight',
    'session zero','DM screen','character sheet','NPC','BBEG',
    'lawful good','chaotic evil','true neutral','chaotic good',
    'plot hook','side quest','random encounter','main quest',
    'ambush!','roll for initiative','I attack the darkness',
    'cantrip','ritual cast','familiar','metamagic',
    'multiclass','subclass','feat','spell slot',
    'tavern brawl','dungeon crawl','boss fight','mini-boss'
  ];

  const GRID_STEP = 0.055;
  const GRID_BOUNDARY = 0.92;
  const NUM = 700;
  const SCALE_TEXT = 0.26;
  const SCALE_DOT_MIN = 0.02;
  const stage = document.getElementById('stage');
  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');
  const distEl = document.getElementById('dist');
  const hintEl = document.getElementById('hint');
  const zoomEl = document.getElementById('zoom');
  const zoomValEl = document.getElementById('zoom-val');

  const sqrt3_2 = Math.sqrt(3) / 2;
  const gridPoints = [];
  const r2maxGrid = GRID_BOUNDARY * GRID_BOUNDARY;
  const maxRange = Math.ceil(GRID_BOUNDARY / GRID_STEP) + 2;
  for (let j = -maxRange; j <= maxRange; j++) {
    const y = j * GRID_STEP * sqrt3_2;
    const xOff = (j & 1) === 0 ? 0 : GRID_STEP / 2;
    for (let i = -maxRange; i <= maxRange; i++) {
      const x = i * GRID_STEP + xOff;
      if (x*x + y*y < r2maxGrid) gridPoints.push([x, y]);
    }
  }

  const probe = document.createElement('div');
  probe.style.cssText = 'position:absolute;color:var(--grid);visibility:hidden;left:0;top:0';
  stage.appendChild(probe);
  const gridColor = getComputedStyle(probe).color || '#888';
  stage.removeChild(probe);

  const shuffled = gridPoints.slice();
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const items = [];
  for (let i = 0; i < NUM; i++) {
    const g = shuffled[i % shuffled.length];
    const el = document.createElement('div');
    el.className = 'item c' + (1 + Math.floor(Math.random() * 4));
    el.textContent = words[Math.floor(Math.random() * words.length)];
    stage.appendChild(el);
    items.push({ p: [g[0], g[1]], el });
  }

  let interactionMode = 'pan';
  let zoom = 1.0;
  let view = identity;
  let mode = 'idle';
  let dragStartPt = null;
  let downPos = null;
  let didMove = false;
  let dragItem = null;
  let editingItem = null;
  let flying = false;

  const HINTS = {
    pan: '导航模式：拖拽平移 · 点空白处飞过去',
    edit: '编辑模式：点卡片编辑 · 拖拽平移',
    move: '移动模式：拖卡片 snap 到网格 · 拖空白平移'
  };

  const drawGrid = (W, H, cx, cy, R) => {
    const dpr = window.devicePixelRatio || 1;
    const tw = Math.round(W * dpr), th = Math.round(H * dpr);
    if (canvas.width !== tw || canvas.height !== th) {
      canvas.width = tw; canvas.height = th;
    }
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = gridColor;
    ctx.globalAlpha = 0.45;
    ctx.beginPath();
    for (const g of gridPoints) {
      const z = mApply(view, g);
      const az2 = z[0]*z[0] + z[1]*z[1];
      if (az2 > 0.998) continue;
      const sx = cx + z[0] * R;
      const sy = cy + z[1] * R;
      if (sx < -2 || sx > W+2 || sy < -2 || sy > H+2) continue;
      const size = Math.max(0.45, (1 - az2) * 1.4);
      ctx.moveTo(sx + size, sy);
      ctx.arc(sx, sy, size, 0, Math.PI * 2);
    }
    ctx.fill();
  };

  const render = () => {
    const r = stage.getBoundingClientRect();
    const W = r.width, H = r.height;
    const cx = W / 2, cy = H / 2;
    const R = Math.sqrt(cx*cx + cy*cy) * zoom;
    drawGrid(W, H, cx, cy, R);
    for (const it of items) {
      if (it === editingItem) {
        it.el.style.display = '';
        it.el.classList.remove('as-dot', 'as-pill-h', 'as-pill-v');
        it.el.style.transform = 'translate(' + cx + 'px, ' + cy + 'px) translate(-50%, -50%) scale(1)';
        it.el.style.opacity = 1;
        continue;
      }
      const z = mApply(view, it.p);
      const az2 = cabs2(z);
      const scale = 1 - az2;
      if (az2 > 0.998 || scale < SCALE_DOT_MIN) {
        it.el.style.display = 'none';
        continue;
      }
      const sx = cx + z[0] * R;
      const sy = cy + z[1] * R;
      const inRect = sx >= 0 && sx <= W && sy >= 0 && sy <= H;
      if (inRect) {
        if (scale > SCALE_TEXT) {
          it.el.classList.remove('as-dot', 'as-pill-h', 'as-pill-v');
          it.el.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%) scale(' + scale + ')';
          it.el.style.opacity = Math.min(1, scale * 3);
        } else {
          it.el.classList.add('as-dot');
          it.el.classList.remove('as-pill-h', 'as-pill-v');
          it.el.style.transform = 'translate(' + sx + 'px, ' + sy + 'px) translate(-50%, -50%)';
          it.el.style.opacity = Math.min(0.8, (scale - SCALE_DOT_MIN) * 5);
        }
      } else {
        const margin = 10;
        const dx = sx - cx, dy = sy - cy;
        const tx = Math.abs(dx) < 1e-9 ? Infinity : (cx - margin) / Math.abs(dx);
        const ty = Math.abs(dy) < 1e-9 ? Infinity : (cy - margin) / Math.abs(dy);
        const t = Math.min(tx, ty);
        const ex = cx + t * dx, ey = cy + t * dy;
        it.el.classList.remove('as-dot');
        if (ty < tx) {
          it.el.classList.add('as-pill-h');
          it.el.classList.remove('as-pill-v');
        } else {
          it.el.classList.add('as-pill-v');
          it.el.classList.remove('as-pill-h');
        }
        it.el.style.transform = 'translate(' + ex + 'px, ' + ey + 'px) translate(-50%, -50%)';
        it.el.style.opacity = Math.min(0.7, scale * 2 + 0.2);
      }
      it.el.style.display = '';
    }
    const orig = mApply(mInv(view), [0, 0]);
    const rr = cabs(orig);
    const hd = rr < 0.9999 ? 2 * Math.atanh(rr) : 99;
    if (distEl) distEl.textContent = hd.toFixed(2);
  };

  let rafId = null;
  const reqRender = () => {
    if (rafId) return;
    rafId = requestAnimationFrame(() => { rafId = null; render(); });
  };

  const screenToDisk = (clientX, clientY) => {
    const r = stage.getBoundingClientRect();
    const W = r.width, H = r.height;
    const cx = W / 2, cy = H / 2;
    const R = Math.sqrt(cx*cx + cy*cy) * zoom;
    return [(clientX - r.left - cx) / R, (clientY - r.top - cy) / R];
  };

  const clampDisk = (z) => {
    if (cabs2(z) > 0.93) {
      const r = cabs(z);
      return cscale(z, Math.sqrt(0.93) / r);
    }
    return z;
  };

  const snapToGridScreen = (clientX, clientY) => {
    const r = stage.getBoundingClientRect();
    const W = r.width, H = r.height;
    const cx = W / 2, cy = H / 2;
    const R = Math.sqrt(cx*cx + cy*cy) * zoom;
    const sxC = clientX - r.left, syC = clientY - r.top;
    let bestDist2 = Infinity;
    let best = null;
    for (const g of gridPoints) {
      const z = mApply(view, g);
      if (z[0]*z[0] + z[1]*z[1] > 0.998) continue;
      const gsx = cx + z[0] * R;
      const gsy = cy + z[1] * R;
      const dx = sxC - gsx, dy = syC - gsy;
      const d2 = dx*dx + dy*dy;
      if (d2 < bestDist2) {
        bestDist2 = d2;
        best = g;
      }
    }
    return best ? [best[0], best[1]] : null;
  };

  const flyTo = (target, ms, onDone) => {
    if (flying) return;
    ms = ms || 450;
    const startView = view;
    const startPos = mApply(startView, target);
    const t0 = performance.now();
    flying = true;
    const step = () => {
      const t = Math.min(1, (performance.now() - t0) / ms);
      const e = 1 - Math.pow(1 - t, 3);
      const pos = cscale(startPos, 1 - e);
      view = mFromPQ(target, pos);
      render();
      if (t < 1) requestAnimationFrame(step);
      else { flying = false; if (onDone) onDone(); }
    };
    requestAnimationFrame(step);
  };

  const startEdit = (item) => {
    mode = 'editing';
    editingItem = item;
    flyTo(item.p, 380, () => {
      item.el.contentEditable = 'plaintext-only';
      item.el.classList.remove('as-dot', 'as-pill-h', 'as-pill-v');
      item.el.classList.add('editing');
      render();
      item.el.focus();
      const range = document.createRange();
      range.selectNodeContents(item.el);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    });
  };

  const endEdit = () => {
    if (!editingItem) return;
    const it = editingItem;
    it.el.contentEditable = 'false';
    it.el.classList.remove('editing');
    it.el.blur();
    if (!it.el.textContent.trim()) it.el.textContent = '·';
    editingItem = null;
    mode = 'idle';
    reqRender();
  };

  stage.addEventListener('pointerdown', e => {
    if (e.target.closest('.mode-buttons, .zoom-control')) return;
    if (mode === 'editing') {
      const targetItem = e.target.closest('.item');
      if (editingItem && targetItem === editingItem.el) return;
      endEdit();
      e.preventDefault();
      return;
    }
    if (flying) return;
    const itemEl = e.target.closest('.item');
    downPos = [e.clientX, e.clientY];
    didMove = false;
    const z = clampDisk(screenToDisk(e.clientX, e.clientY));
    dragStartPt = mApply(mInv(view), z);
    if (itemEl) {
      const item = items.find(it => it.el === itemEl);
      if (!item) return;
      mode = 'pending-item';
      dragItem = item;
    } else {
      mode = 'pending-pan';
    }
    stage.setPointerCapture(e.pointerId);
    stage.classList.add('dragging');
  });

  stage.addEventListener('pointermove', e => {
    if (mode === 'idle' || mode === 'editing' || flying) return;
    if (!didMove) {
      const dx = e.clientX - downPos[0];
      const dy = e.clientY - downPos[1];
      if (dx*dx + dy*dy > 16) didMove = true;
      else return;
    }
    if (mode === 'pending-pan' || mode === 'pan') {
      mode = 'pan';
      const z = clampDisk(screenToDisk(e.clientX, e.clientY));
      view = mFromPQ(dragStartPt, z);
    } else if (mode === 'pending-item' || mode === 'item-drag' || mode === 'pan-from-item') {
      if (interactionMode === 'move') {
        if (mode !== 'item-drag') {
          mode = 'item-drag';
          stage.classList.add('item-drag');
        }
        const snapped = snapToGridScreen(e.clientX, e.clientY);
        if (snapped) dragItem.p = snapped;
      } else {
        mode = 'pan-from-item';
        const z = clampDisk(screenToDisk(e.clientX, e.clientY));
        view = mFromPQ(dragStartPt, z);
      }
    }
    reqRender();
  });

  const endPointer = () => {
    if (mode === 'idle' || mode === 'editing' || flying) return;
    stage.classList.remove('dragging');
    stage.classList.remove('item-drag');
    if (!didMove) {
      if (mode === 'pending-pan' && dragStartPt) {
        flyTo(dragStartPt);
      } else if (mode === 'pending-item' && dragItem) {
        if (interactionMode === 'edit') {
          startEdit(dragItem);
          dragStartPt = null;
          dragItem = null;
          return;
        } else {
          flyTo(dragItem.p);
        }
      }
    }
    mode = 'idle';
    dragStartPt = null;
    dragItem = null;
  };
  stage.addEventListener('pointerup', endPointer);
  stage.addEventListener('pointercancel', endPointer);

  document.addEventListener('keydown', e => {
    if (mode === 'editing') {
      if (e.key === 'Enter' || e.key === 'Escape') {
        e.preventDefault();
        endEdit();
      }
    }
  });

  const modeButtons = stage.querySelectorAll('.mode-buttons button');
  modeButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      if (editingItem) endEdit();
      interactionMode = btn.dataset.mode;
      modeButtons.forEach(b => b.classList.toggle('active', b === btn));
      stage.classList.remove('mode-pan', 'mode-edit', 'mode-move');
      stage.classList.add('mode-' + interactionMode);
      hintEl.textContent = HINTS[interactionMode];
    });
  });

  zoomEl.addEventListener('input', () => {
    zoom = parseFloat(zoomEl.value);
    zoomValEl.textContent = zoom.toFixed(1) + '×';
    reqRender();
  });

  document.getElementById('reset').addEventListener('click', () => {
    if (editingItem) endEdit();
    flyTo([0, 0]);
  });

  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(reqRender).observe(stage);
  }
  window.addEventListener('resize', reqRender);
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
